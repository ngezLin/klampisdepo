name: pos_app
description: A new Flutter project for KlampisDepo POS.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.0.0

  # Networking
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1

  # Local DB
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.1
  path: ^1.8.3

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # Network Monitoring
  connectivity_plus: ^6.0.0

  # Printer
  unified_esc_pos_printer: 3.2.0

  # UI & Images
  cached_network_image: ^3.3.0
  image_picker: ^1.0.7
  intl: ^0.19.0
  badges: ^3.1.2
  flutter_spinkit: ^5.2.0
  skeletonizer: ^1.0.0
  
  # JWT
  jwt_decoder: ^2.0.1
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  integration_test:
    sdk: flutter
  
  # Code Generation
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1
  freezed: ^2.4.6
  drift_dev: ^2.14.0

flutter:
  uses-material-design: true
  # Add assets here if needed
  # assets:
  #   - assets/images/placeholder.png
