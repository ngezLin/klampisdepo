name: CD - Deploy & Verify

on:
  push:
    branches: [main]

jobs:
  deploy-and-test:
    name: Deploy → E2E Test → Rollback if Failed
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────────────────────
      # STEP 1: Checkout the code (needed for SCP upload)
      # ─────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────────
      # STEP 2: Setup SSH key for VPS access
      # ─────────────────────────────────────────────────────────────
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # ─────────────────────────────────────────────────────────────
      # STEP 3: Save current VPS state for rollback
      # ─────────────────────────────────────────────────────────────
      - name: Save rollback snapshot on VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /var/www/klampisdepo && ls -la api/src > /tmp/kd_prev_state.txt && echo 'Snapshot saved'"

      # ─────────────────────────────────────────────────────────────
      # STEP 4: Upload API source files via SCP
      # ─────────────────────────────────────────────────────────────
      - name: Upload API source to VPS
        run: |
          scp -r -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 \
            api/src \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/klampisdepo/api/

          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 \
            api/main.go api/go.mod api/go.sum api/Dockerfile \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/klampisdepo/api/

      # ─────────────────────────────────────────────────────────────
      # STEP 5: Rebuild Docker containers on VPS
      # ─────────────────────────────────────────────────────────────
      - name: Rebuild and restart backend on VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /var/www/klampisdepo && docker compose up -d --build backend"

      # ─────────────────────────────────────────────────────────────
      # STEP 6: Wait for backend health check
      # ─────────────────────────────────────────────────────────────
      - name: Wait for backend to be healthy
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
                echo "✅ Backend is up after ${i}x5s"
                exit 0
              fi
              echo "⏳ Waiting... attempt $i/12"
              sleep 5
            done
            echo "❌ Backend did not respond after 60s"
            exit 1
          EOF

      # ─────────────────────────────────────────────────────────────
      # STEP 7: Setup Flutter for E2E tests
      # ─────────────────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get
        working-directory: mobile

      # ─────────────────────────────────────────────────────────────
      # STEP 8: Setup Chrome + ChromeDriver for headless E2E
      # ─────────────────────────────────────────────────────────────
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Start ChromeDriver
        run: |
          chromedriver --port=4444 &
          sleep 3
          echo "ChromeDriver started on port 4444"

      # ─────────────────────────────────────────────────────────────
      # STEP 9: Run Flutter Web E2E tests against live VPS
      # ─────────────────────────────────────────────────────────────
      - name: Run Flutter E2E integration tests
        id: e2e_tests
        run: |
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/app_test.dart \
            -d chrome \
            --headless \
            --dart-define=TEST_USERNAME=${{ secrets.TEST_USERNAME }} \
            --dart-define=TEST_PASSWORD=${{ secrets.TEST_PASSWORD }}
        working-directory: mobile

      # ─────────────────────────────────────────────────────────────
      # STEP 10: Rollback VPS if E2E tests failed
      # ─────────────────────────────────────────────────────────────
      - name: Rollback VPS on test failure
        if: failure()
        run: |
          echo "🔄 Tests failed — rolling back VPS to previous version..."
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            cd /var/www/klampisdepo
            # Restore from git stash (we stashed before deploying)
            git stash pop 2>/dev/null || echo "No stash found, using git reset"
            docker compose up -d --build backend
            echo "✅ Rollback complete"
          EOF

      # ─────────────────────────────────────────────────────────────
      # STEP 11: Notify result
      # ─────────────────────────────────────────────────────────────
      - name: Deployment summary
        if: success()
        run: |
          echo "🎉 Deployment successful! All E2E tests passed."
          echo "🌐 Live at https://api.klampisdepo.com"
